<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
    }

    .phone-frame {
      width: 390px;
      height: 844px;
      background: #0a0a0a;
      border-radius: 50px;
      border: 12px solid #1a1a1a;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .phone-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 28px;
      background: #0a0a0a;
      border-radius: 0 0 20px 20px;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
    }

    .screen-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 60px 24px 40px;
      position: relative;
      overflow: auto;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
    }

    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 20px;
    }

    h1 { font-size: 36px; font-weight: 700; line-height: 1.2; margin-bottom: 8px; }
    h2 { font-size: 28px; font-weight: 700; line-height: 1.2; margin-bottom: 12px; }
    h3 { font-size: 16px; font-weight: 600; margin: 0; }
    p { font-size: 16px; color: #aaa; line-height: 1.6; margin: 0; }

    .icon-placeholder {
      width: 80px;
      height: 80px;
      background: rgba(255, 45, 85, 0.15);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 16px;
    }

    .button {
      padding: 16px 24px;
      border-radius: 12px;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .button-primary {
      background: #FF2D55;
      color: white;
      width: 100%;
    }

    .button-primary:hover {
      background: #ff1144;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255, 45, 85, 0.4);
    }

    .button-primary:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .button-secondary {
      background: transparent;
      color: #aaa;
      border: 1px solid #333;
      width: 100%;
    }

    .button-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: #555;
    }

    .button-small {
      padding: 12px 16px;
      font-size: 14px;
      width: auto;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-label {
      font-size: 14px;
      color: #888;
      margin-bottom: 8px;
      display: block;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      transition: all 0.2s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: #FF2D55;
      background: #222;
      box-shadow: 0 0 0 3px rgba(255, 45, 85, 0.1);
    }

    .input-field::placeholder {
      color: #555;
    }

    .feature-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #333;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .feature-card-icon {
      width: 40px;
      height: 40px;
      background: rgba(255, 45, 85, 0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .feature-card p {
      font-size: 13px;
      color: #888;
    }

    .mall-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #333;
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .mall-card:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
      border-color: #555;
    }

    .mall-card.featured {
      background: rgba(255, 45, 85, 0.15);
      border-color: #FF2D55;
    }

    .mall-icon {
      width: 60px;
      height: 60px;
      background: rgba(255, 45, 85, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .mall-info {
      flex: 1;
    }

    .mall-info h3 {
      margin-bottom: 6px;
    }

    .mall-info p {
      font-size: 13px;
      color: #888;
      margin-bottom: 4px;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #FF2D55;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-box {
      background: rgba(255, 45, 85, 0.15);
      border: 1px solid #FF2D55;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }

    .error-box p {
      color: #FF2D55;
      font-size: 14px;
    }

    .success-box {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid #22c55e;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }

    .success-box p {
      color: #22c55e;
      font-size: 14px;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .header-bar button {
      background: none;
      border: none;
      color: #aaa;
      font-size: 24px;
      cursor: pointer;
    }

    .lang-toggle {
      display: flex;
      gap: 4px;
    }

    .lang-btn {
      background: #333;
      border: none;
      color: #fff;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s ease;
    }

    .lang-btn.active {
      background: #FF2D55;
    }

    .reservation-card {
      background: rgba(255, 45, 85, 0.15);
      border: 1px solid #FF2D55;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      text-align: center;
    }

    .reservation-card h3 {
      margin-bottom: 8px;
      color: #FF2D55;
    }

    .reservation-card p {
      margin-bottom: 4px;
    }

    .parking-info {
      background: rgba(255, 45, 85, 0.15);
      border: 1px solid #FF2D55;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
    }

    .parking-info h3 {
      color: #FF2D55;
      margin-bottom: 8px;
    }

    .map-placeholder {
      width: 100%;
      height: 200px;
      background: rgba(255, 45, 85, 0.1);
      border: 1px solid #333;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .spacer {
      flex: 1;
    }

    .store-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .store-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 14px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .store-icon {
      width: 40px;
      height: 40px;
      background: rgba(255, 45, 85, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .store-details {
      flex: 1;
    }

    .store-details h4 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 2px 0;
    }

    .store-details p {
      font-size: 12px;
      color: #888;
      margin: 0;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      background: rgba(255, 45, 85, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 16px;
    }

    .settings-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #333;
      border-radius: 12px;
      margin-bottom: 12px;
    }

    .settings-item label {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .toggle-switch {
      width: 50px;
      height: 28px;
      background: #333;
      border-radius: 14px;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    .toggle-switch.on {
      background: #FF2D55;
    }
  </style>
</head>

      parking: 'บันทึกที่จอดรถ',

      confirmLogout: 'คุณแน่ใจหรือว่าต้องการออกจากระบบ?'

    // Unified journey component
    function JourneyScreen({ screen, lang = 'en' }) {
      const t = lang === 'th' ? t_th : t_en;
      const [phoneValue, setPhoneValue] = useState('');
      const [codeValue, setCodeValue] = useState('');
      const [nameValue, setNameValue] = useState('');
      const [emailValue, setEmailValue] = useState('');

      const renderScreen = () => {
        switch(screen) {
          case 'welcome':
            return (
              <div className="screen">
                <div>
                  <div className="icon-placeholder">🗺️</div>
                  <h1>{t.welcome}</h1>
                  <p>{t.tagline}</p>
                </div>
                <div className="spacer"></div>
                <div>
                  <button className="button button-primary">{t.getStarted}</button>
                  <button className="button button-secondary" style={{ marginTop: 12 }}>{t.skip}</button>
                </div>
              </div>
            );

          case 'phone':
            return (
              <div className="screen">
                <div>
                  <h2>{t.enterPhone}</h2>
                  <p>{t.tagline}</p>
                </div>
                <div>
                  <div className="input-group">
                    <label className="input-label">{t.phoneNumber}</label>
                    <input type="tel" className="input-field" placeholder={t.placeholder_phone} value={phoneValue} onChange={(e) => setPhoneValue(e.target.value)} />
                  </div>
                </div>
                <div className="spacer"></div>
                <div>
                  <button className="button button-primary">{t.sendCode}</button>
                  <button className="button button-secondary" style={{ marginTop: 12 }}>{t.back}</button>
                </div>
              </div>
            );

          case 'phone-loading':
            return (
              <div className="screen">
                <div style={{ textAlign: 'center' }}>
                  <div style={{ marginBottom: 24 }}>
                    <div className="loading-spinner" style={{ margin: '0 auto' }}></div>
                  </div>
                  <h2>{t.verifying}</h2>
                  <p>{t.tagline}</p>
                </div>
                <div className="spacer"></div>
              </div>
            );

          case 'code':
            return (
              <div className="screen">
                <div>
                  <h2>{t.enterCode}</h2>
                  <p>{t.codeSent}</p>
                </div>
                <div className="success-box">
                  <p>✓ {t.codeSent}</p>
                </div>
                <div>
                  <div className="input-group">
                    <label className="input-label">{t.code}</label>
                    <input type="text" className="input-field" placeholder={t.placeholder_code} maxLength="6" value={codeValue} onChange={(e) => setCodeValue(e.target.value)} />
                  </div>
                </div>
                <div className="spacer"></div>
                <div>
                  <button className="button button-primary" disabled={codeValue.length < 6}>{t.verify}</button>
                  <button className="button button-secondary" style={{ marginTop: 12 }}>{t.back}</button>
                </div>
              </div>
            );

          case 'code-error':
            return (
              <div className="screen">
                <div>
                  <h2>{t.enterCode}</h2>
                  <p>Try again</p>
                </div>
                <div className="error-box">
                  <p>✗ {t.invalidCode}</p>
                </div>
                <div>
                  <div className="input-group">
                    <label className="input-label">{t.code}</label>
                    <input type="text" className="input-field" placeholder={t.placeholder_code} maxLength="6" />
                  </div>
                </div>
                <div className="spacer"></div>
                <div>
                  <button className="button button-primary">{t.verify}</button>
                  <button className="button button-secondary" style={{ marginTop: 12 }}>{t.back}</button>
                </div>
              </div>
            );

          case 'profile':
            return (
              <div className="screen">
                <div>
                  <h2>{t.profile}</h2>
                  <p>Just a couple of quick questions</p>
                </div>
                <div>
                  <div className="input-group">
                    <label className="input-label">{t.fullName}</label>
                    <input type="text" className="input-field" placeholder={t.placeholder_name} value={nameValue} onChange={(e) => setNameValue(e.target.value)} />
                  </div>
                  <div className="input-group">
                    <label className="input-label">{t.email}</label>
                    <input type="email" className="input-field" placeholder={t.placeholder_email} value={emailValue} onChange={(e) => setEmailValue(e.target.value)} />
                  </div>
                </div>
                <div className="spacer"></div>
                <div>
                  <button className="button button-primary">{t.saveProfile}</button>
                  <button className="button button-secondary" style={{ marginTop: 12 }}>{t.skip}</button>
                </div>
              </div>
            );

          case 'location':
            return (
              <div className="screen">
                <div>
                  <div className="icon-placeholder">📍</div>
                  <h2>{t.permissions}</h2>
                  <p>{t.permDesc}</p>
                </div>
                <div className="spacer"></div>
                <div>
                  <button className="button button-primary">{t.allowLocation}</button>
                  <button className="button button-secondary" style={{ marginTop: 12 }}>{t.skipLocation}</button>
                </div>
              </div>
            );

          case 'home':
            return (
              <div className="screen">
                <div className="header-bar">
                  <div>
                    <p style={{ fontSize: 12, color: '#888', margin: '0 0 4px 0' }}>{t.currentLocation}</p>
                    <h2 style={{ margin: 0, fontSize: 24 }}>{t.bangkok}</h2>
                  </div>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <div className="mall-card featured">
                    <div className="mall-icon">🏢</div>
                    <div className="mall-info">
                      <h3>Central World</h3>
                      <p>📍 2.3 km</p>
                      <p>500+ {t.stores}</p>
                    </div>
                  </div>
                  <div className="mall-card">
                    <div className="mall-icon">🏬</div>
                    <div className="mall-info">
                      <h3>Siam Paragon</h3>
                      <p>📍 1.8 km</p>
                      <p>350+ {t.stores}</p>
                    </div>
                  </div>
                  <div className="mall-card">
                    <div className="mall-icon">🏘️</div>
                    <div className="mall-info">
                      <h3>EmQuartier</h3>
                      <p>📍 3.1 km</p>
                      <p>280+ {t.stores}</p>
                    </div>
                  </div>
                </div>
                <div className="spacer"></div>
                <button className="button button-primary">{t.search}</button>
              </div>
            );

          case 'mall-detail':
            return (
              <div className="screen">
                <div className="header-bar">
                  <button>←</button>
                  <h2 style={{ margin: 0, fontSize: 20 }}>Central World</h2>
                  <div style={{ width: 24 }}></div>
                </div>
                <div>
                  <div className="map-placeholder">Interactive Floor Map</div>
                  <p style={{ marginBottom: 16 }}>500+ {t.stores} • 2.3 {t.distance}</p>
                </div>
                <div>
                  <h3 style={{ marginBottom: 12 }}>{t.restaurants}</h3>
                  <div className="store-list">
                    <div className="store-item">
                      <div className="store-icon">🍽️</div>
                      <div className="store-details">
                        <h4>Siam Kitchen</h4>
                        <p>Level 3 • {t.reserve}</p>
                      </div>
                    </div>
                    <div className="store-item">
                      <div className="store-icon">🍜</div>
                      <div className="store-details">
                        <h4>Ramen House</h4>
                        <p>Level 2 • {t.reserve}</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );

          case 'reserve':
            return (
              <div className="screen">
                <div className="header-bar">
                  <button>←</button>
                  <h2 style={{ margin: 0, fontSize: 20 }}>Siam Kitchen</h2>
                  <div style={{ width: 24 }}></div>
                </div>
                <div>
                  <p>⏱️ Average wait: 25 minutes</p>
                  <p style={{ fontSize: 14, color: '#888' }}>4 parties ahead of you</p>
                </div>
                <div className="spacer"></div>
                <div>
                  <button className="button button-primary">{t.reserve}</button>
                  <button className="button button-secondary" style={{ marginTop: 12 }}>{t.back}</button>
                </div>
              </div>
            );

          case 'reserved':
            return (
              <div className="screen">
                <div>
                  <div style={{ textAlign: 'center', marginBottom: 24 }}>
                    <div style={{ fontSize: 60, marginBottom: 16 }}>✓</div>
                    <h2>{t.reservationTitle}</h2>
                  </div>
                  <div className="reservation-card">
                    <h3>Siam Kitchen</h3>
                    <p style={{ fontSize: 24, fontWeight: 700, margin: '12px 0', color: '#FF2D55' }}>28</p>
                    <p>{t.reservationTime}</p>
                  </div>
                </div>
                <div className="spacer"></div>
                <div>
                  <button className="button button-primary">Okay</button>
                </div>
              </div>
            );

          case 'parking':
            return (
              <div className="screen">
                <div className="header-bar">
                  <button>←</button>
                  <h2 style={{ margin: 0, fontSize: 20 }}>{t.parking}</h2>
                  <div style={{ width: 24 }}></div>
                </div>
                <div className="map-placeholder">Parking Lot Map</div>
                <div>
                  <p style={{ marginBottom: 16 }}>Select your parking spot</p>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8, marginBottom: 20 }}>
                    {['A1', 'A2', 'A3', 'A4', 'B1', 'B2', 'B3', 'B4'].map((spot) => (
                      <button key={spot} style={{
                        padding: '12px',
                        background: spot === 'A3' ? '#FF2D55' : '#333',
                        color: '#fff',
                        border: 'none',
                        borderRadius: '8px',
                        cursor: 'pointer',
                        fontWeight: 600,
                        fontSize: 12
                      }}>
                        {spot}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="spacer"></div>
                <button className="button button-primary">{t.parking}</button>
              </div>
            );

          case 'parked':
            return (
              <div className="screen">
                <div>
                  <div style={{ textAlign: 'center', marginBottom: 24 }}>
                    <div style={{ fontSize: 60, marginBottom: 16 }}>✓</div>
                    <h2>{t.yourParking}</h2>
                  </div>
                  <div className="parking-info">
                    <h3>{t.level} 2 • {t.zone} A3</h3>
                    <p style={{ marginTop: 8 }}>Tap to navigate back</p>
                  </div>
                </div>
                <div className="spacer"></div>
                <div>
                  <button className="button button-primary">{t.walkBack}</button>
                  <button className="button button-secondary" style={{ marginTop: 12 }}>Explore More</button>
                </div>
              </div>
            );

          case 'profile-view':
            return (
              <div className="screen">
                <div style={{ textAlign: 'center', marginBottom: 20 }}>
                  <div className="profile-avatar">👤</div>
                  <h2>John Doe</h2>
                  <p>john@example.com</p>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 20 }}>
                  <div className="settings-item">
                    <span>{t.visitHistory}</span>
                    <span style={{ color: '#FF2D55' }}>→</span>
                  </div>
                  <div className="settings-item">
                    <span>{t.favorites}</span>
                    <span style={{ color: '#FF2D55' }}>→</span>
                  </div>
                  <div className="settings-item">
                    <span>{t.settings}</span>
                    <span style={{ color: '#FF2D55' }}>→</span>
                  </div>
                </div>
                <div className="spacer"></div>
                <button className="button button-secondary">{t.logout}</button>
              </div>
            );

          case 'settings':
            return (
              <div className="screen">
                <div className="header-bar">
                  <button>←</button>
                  <h2 style={{ margin: 0, fontSize: 20 }}>{t.settings}</h2>
                  <div style={{ width: 24 }}></div>
                </div>
                <div>
                  <div className="settings-item">
                    <label>{t.notifications}</label>
                    <button className="toggle-switch on"></button>
                  </div>
                  <div className="settings-item">
                    <label>{t.darkMode}</label>
                    <button className="toggle-switch on"></button>
                  </div>
                  <div className="settings-item">
                    <label>{t.language}</label>
                    <span style={{ color: '#FF2D55' }}>→</span>
                  </div>
                </div>
                <div className="spacer"></div>
              </div>
            );

          default:
            return null;
        }
      };

      return (
        <div className="phone-frame">
          <div className="screen-content">
            <div className="lang-toggle" style={{ position: 'absolute', top: 12, right: 24 }}>
              <button className={`lang-btn ${lang === 'th' ? 'active' : ''}`}>TH</button>
              <button className={`lang-btn ${lang === 'en' ? 'active' : ''}`}>EN</button>
            </div>
            {renderScreen()}
          </div>
        </div>
      );
    }

    // All screens in the journey
    const screens = [
      { id: 'welcome', name: 'Welcome' },
      { id: 'phone', name: 'Phone Entry' },
      { id: 'phone-loading', name: 'Phone Loading' },
      { id: 'code', name: 'Code Verification' },
      { id: 'code-error', name: 'Code Error State' },
      { id: 'profile', name: 'Profile Setup' },
      { id: 'location', name: 'Location Permission' },
      { id: 'home', name: 'Home - Malls List' },
      { id: 'mall-detail', name: 'Mall Detail & Stores' },
      { id: 'reserve', name: 'Queue Reservation' },
      { id: 'reserved', name: 'Reserved Confirmation' },
      { id: 'parking', name: 'Parking Selection' },
      { id: 'parked', name: 'Parking Saved' },
      { id: 'profile-view', name: 'User Profile' },
      { id: 'settings', name: 'Settings' }
    ];

    ReactDOM.render(
      <DCSection id="mallmate-journey" title="MallMate Complete User Journey (TH/EN)">
        {screens.flatMap((screen) => [
          <DCArtboard key={`${screen.id}-en`} id={`${screen.id}-en`} label={`${screen.name} (EN)`} width={390} height={844}>
            <JourneyScreen screen={screen.id} lang="en" />
          </DCArtboard>,
          <DCArtboard key={`${screen.id}-th`} id={`${screen.id}-th`} label={`${screen.name} (TH)`} width={390} height={844}>
            <JourneyScreen screen={screen.id} lang="th" />
          </DCArtboard>
        ])}
      </DCSection>,
      document.getElementById('root')
    );
  </script>

  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
  </style>
</body>
</html>
