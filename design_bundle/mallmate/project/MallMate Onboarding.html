<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
    }

    /* iOS-style phone frame */
    .phone-frame {
      width: 390px;
      height: 844px;
      background: #0a0a0a;
      border-radius: 50px;
      border: 12px solid #1a1a1a;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .phone-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 28px;
      background: #0a0a0a;
      border-radius: 0 0 20px 20px;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
    }

    .screen-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 60px 24px 40px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
    }

    .skip-btn {
      position: absolute;
      top: 12px;
      right: 16px;
      background: transparent;
      border: none;
      color: #888;
      font-size: 14px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      z-index: 5;
    }

    /* Screens */
    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
    }

    .screen h1 {
      font-size: 36px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .screen h2 {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .screen p {
      font-size: 16px;
      color: #aaa;
      line-height: 1.6;
      margin-bottom: 8px;
    }

    /* Feature icons/placeholders */
    .icon-placeholder {
      width: 80px;
      height: 80px;
      background: rgba(255, 45, 85, 0.15);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 16px;
    }

    /* Buttons */
    .button {
      padding: 16px 24px;
      border-radius: 12px;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .button-primary {
      background: #FF2D55;
      color: white;
      width: 100%;
    }

    .button-primary:hover {
      background: #ff1144;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255, 45, 85, 0.4);
    }

    .button-secondary {
      background: transparent;
      color: #aaa;
      border: 1px solid #333;
      width: 100%;
    }

    .button-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: #555;
    }

    /* Input field */
    .input-group {
      margin-bottom: 16px;
    }

    .input-label {
      font-size: 14px;
      color: #888;
      margin-bottom: 8px;
      display: block;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      transition: all 0.2s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: #FF2D55;
      background: #222;
      box-shadow: 0 0 0 3px rgba(255, 45, 85, 0.1);
    }

    /* Feature cards */
    .feature-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #333;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .feature-card-icon {
      width: 40px;
      height: 40px;
      background: rgba(255, 45, 85, 0.15);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .feature-card h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .feature-card p {
      font-size: 13px;
      color: #888;
      margin-bottom: 0;
    }

    /* Progress indicator */
    .progress-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: auto;
      padding-bottom: 20px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #333;
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .dot.active {
      background: #FF2D55;
      width: 24px;
      border-radius: 4px;
    }

    /* Language toggle */
    .lang-toggle {
      position: absolute;
      top: 12px;
      left: 16px;
      display: flex;
      gap: 4px;
      z-index: 5;
    }

    .lang-btn {
      background: #333;
      border: none;
      color: #fff;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s ease;
    }

    .lang-btn.active {
      background: #FF2D55;
    }

    /* Mall list item */
    .mall-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #333;
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .mall-card:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
      border-color: #555;
    }

    .mall-card.featured {
      background: rgba(255, 45, 85, 0.15);
      border-color: #FF2D55;
    }

    .mall-card.featured:hover {
      background: rgba(255, 45, 85, 0.25);
    }

    .mall-icon {
      width: 60px;
      height: 60px;
      background: rgba(255, 45, 85, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .mall-info {
      flex: 1;
    }

    .mall-info h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 6px 0;
    }

    .mall-info p {
      font-size: 13px;
      color: #888;
      margin: 0 0 4px 0;
    }

    .mall-arrow {
      display: flex;
      align-items: center;
      color: #FF2D55;
      font-size: 20px;
    }
  </style>
</head>
